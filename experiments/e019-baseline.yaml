# E019: Stable baseline for autoresearch
# Combines all proven-in-isolation improvements into one config.
# This is the "stable build" — every future experiment starts here.
# Run on 7.7K FD top-5 data for first rollout coherence baseline.
#
# Note: cascaded_heads excluded — E014 showed promise (AR damage drift fix)
# but regressed TF metrics at 1.9K and was never isolated at 7.7K scale.
# Will be tested as a separate experiment (e020) against this baseline.

data:
  dataset_dir: null
  max_games: null
  stage_filter: 32  # Final Destination
  character_filter: [1, 2, 7, 18, 22]  # Fox, Falcon, Sheik, Marth, Falco

encoding:
  state_age_as_embed: true        # learned embedding (E012+)
  state_age_embed_vocab: 150
  state_age_embed_dim: 8
  state_flags: true               # actionability bits (v3)
  hitstun: true                   # combat context (v3)
  ctrl_threshold_features: true   # +5.9pp change_acc (E010c)
  multi_position: true            # 10x training signal (E008c)
  focal_offset: 0                 # honest metrics (E012)
  projectiles: false              # not in training data
  press_events: false
  lookahead: 0

model:
  arch: mamba2
  context_len: 10
  d_model: 384
  d_state: 64
  n_layers: 4
  headdim: 64
  dropout: 0.1
  chunk_size: 10

training:
  lr: 0.0005
  weight_decay: 0.00001
  batch_size: 4096
  num_epochs: 2
  train_split: 0.9
  log_interval: 1000

loss_weights:
  continuous: 1.0
  velocity: 0.5
  dynamics: 0.5
  binary: 1.0
  action: 2.0
  jumps: 0.5
  l_cancel: 0.3
  hurtbox: 0.3
  ground: 0.3
  last_attack: 0.3
  action_change_weight: 5.0

save_dir: checkpoints/e019-baseline
