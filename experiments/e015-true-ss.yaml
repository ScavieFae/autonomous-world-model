# E015: True scheduled sampling — feed model's own predictions back as context
# Tests whether structured self-corruption (vs random noise) reduces autoregressive drift.
# Pure A/B test vs E012: same model, data, loss weights. Only differences:
# - scheduled_sampling: 0.3 (was 0)
# - ss_true: true (feeds own predictions, not Gaussian noise)
# - num_epochs: 4 (SS needs ramp time + recovery)
# Uses E012's encoded data (no re-encode needed).

data:
  dataset_dir: null
  max_games: null
  stage_filter: 32  # Final Destination
  character_filter: [1, 2, 7, 18, 22]  # Fox, Falcon, Sheik, Marth, Falco

encoding:
  state_age_as_embed: true
  state_age_embed_vocab: 150
  state_age_embed_dim: 8
  press_events: false
  lookahead: 0
  focal_offset: 0
  multi_position: true
  projectiles: false
  state_flags: true
  hitstun: true
  ctrl_threshold_features: true

model:
  arch: mamba2
  context_len: 10
  d_model: 384
  d_state: 64
  n_layers: 4
  headdim: 64
  dropout: 0.1
  chunk_size: 10

training:
  lr: 0.0005
  weight_decay: 0.00001
  batch_size: 4096
  num_epochs: 4
  train_split: 0.9
  log_interval: 1000
  scheduled_sampling: 0.3
  ss_true: true
  ss_anneal_epochs: 2

loss_weights:
  continuous: 1.0
  velocity: 0.5
  dynamics: 0.5
  binary: 1.0
  action: 2.0
  jumps: 0.5
  l_cancel: 0.3
  hurtbox: 0.3
  ground: 0.3
  last_attack: 0.3
  action_change_weight: 5.0

save_dir: checkpoints/e015-true-ss
