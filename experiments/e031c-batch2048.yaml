# e031c: Batch scale beyond SF-off
#
# Builds on e031b (SF disabled, GPU-resident data). Adds batch_size 512 → 2048
# and scales LR linearly (5e-4 → 2e-3). Tests whether the Mamba2 sequential
# scan amortizes better at larger batch, pushing TF batch time below 178 ms.
#
# Hypothesis: with GPU-resident data and no SF, the remaining bottleneck is
# kernel launch overhead on the 30-step SSM scan. Bigger batch amortizes
# those kernel launches over more samples. Expected: per-batch time doesn't
# scale 4× with batch (sub-linear), so wall clock improves.
#
# LR scaling: linear from 5e-4 → 2e-3 is a 4× jump. b002's sweep proved
# 5e-4 at batch 512. 2e-3 at batch 2048 is within the standard linear-scaling
# rule for Transformer-family training. Warmup protects early-epoch instability.

data:
  dataset_dir: null
  max_games: null
  stage_filter: 32
  character_filter: [1, 2, 7, 18, 22]

encoding:
  state_age_as_embed: true
  state_age_embed_vocab: 150
  state_age_embed_dim: 8
  state_flags: true
  hitstun: true
  ctrl_threshold_features: true
  multi_position: true
  focal_offset: 0
  projectiles: false
  press_events: false
  lookahead: 0

model:
  arch: mamba2
  context_len: 30
  d_model: 768
  d_state: 64
  n_layers: 4
  headdim: 64
  dropout: 0.1
  chunk_size: 15
  unimix_ratio: 0.01

training:
  lr: 0.002                # 4× b002's 5e-4, linear-scaled with batch
  weight_decay: 0.00001
  batch_size: 2048         # 4× b002's 512
  num_epochs: 2
  train_split: 0.9
  log_interval: 500
  warmup_pct: 0.08         # slightly longer warmup to protect larger batch
  amp: true
  profile: true            # measure the new per-batch breakdown
  gpu_resident: true

self_forcing:
  enabled: false           # e031b result determines if this stays off

loss_weights:
  continuous: 1.0
  velocity: 0.5
  dynamics: 0.5
  binary: 1.0
  action: 2.0
  jumps: 0.5
  l_cancel: 0.3
  hurtbox: 0.3
  ground: 0.3
  last_attack: 0.3

save_dir: checkpoints/e031c-batch2048
