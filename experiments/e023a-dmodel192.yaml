# E023a: Halve d_model from 384 to 192
# Changes from E018c: d_model 384 → 192 (num_heads 12 → 6, d_inner 768 → 384)
# Everything else identical including Self-Forcing, K=30, chunk_size=15.
#
# Phase 1 Tier 1 architecture grid — test if d_model=384 is over-parameterized
# for 1.9K data. 1.29M params vs 4.35M at d_model=384 (3.36x smaller).

data:
  dataset_dir: null
  max_games: null
  stage_filter: 32
  character_filter: [1, 2, 7, 18, 22]

encoding:
  state_age_as_embed: true
  state_age_embed_vocab: 150
  state_age_embed_dim: 8
  state_flags: true
  hitstun: true
  ctrl_threshold_features: true
  multi_position: true
  focal_offset: 0
  projectiles: false
  press_events: false
  lookahead: 0

model:
  arch: mamba2
  context_len: 30
  d_model: 192          # was 384 — halved (num_heads 6, d_inner 384)
  d_state: 64
  n_layers: 4
  headdim: 64
  dropout: 0.1
  chunk_size: 15

training:
  lr: 0.0005
  weight_decay: 0.00001
  batch_size: 512
  num_epochs: 1
  train_split: 0.9
  log_interval: 100

self_forcing:
  enabled: true
  ratio: 4
  unroll_length: 3

loss_weights:
  continuous: 1.0
  velocity: 0.5
  dynamics: 0.5
  binary: 1.0
  action: 2.0
  jumps: 0.5
  l_cancel: 0.3
  hurtbox: 0.3
  ground: 0.3
  last_attack: 0.3

save_dir: checkpoints/e023a-dmodel192
