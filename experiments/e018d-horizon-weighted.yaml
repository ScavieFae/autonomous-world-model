# E018d: Horizon-weighted Self-Forcing loss — weight later AR steps more heavily
# Changes from E018a: adds horizon_weights=true (linear ramp [0.5, 1.25, 2.0] for N=3)
# Everything else identical to E018a.
#
# E018b (N=5) showed truncated BPTT saturates at N=3. This optimizes
# the learning signal within the 3-step window instead of extending it.
# Step 1 is nearly TF (easy), step 3 is where drift happens (hard).

data:
  dataset_dir: null
  max_games: null
  stage_filter: 32  # Final Destination
  character_filter: [1, 2, 7, 18, 22]  # Fox, Falcon, Sheik, Marth, Falco

encoding:
  state_age_as_embed: true
  state_age_embed_vocab: 150
  state_age_embed_dim: 8
  state_flags: true
  hitstun: true
  ctrl_threshold_features: true
  multi_position: true
  focal_offset: 0
  projectiles: false
  press_events: false
  lookahead: 0

model:
  arch: mamba2
  context_len: 10
  d_model: 384
  d_state: 64
  n_layers: 4
  headdim: 64
  dropout: 0.1
  chunk_size: 10

training:
  lr: 0.0005
  weight_decay: 0.00001
  batch_size: 512
  num_epochs: 1
  train_split: 0.9
  log_interval: 100

self_forcing:
  enabled: true
  ratio: 4              # 1 SF batch per 4 TF batches (20% SF)
  unroll_length: 3      # N=3 AR steps per SF batch
  horizon_weights: true # Linear ramp [0.5, 1.25, 2.0] — weight later steps more

loss_weights:
  continuous: 1.0
  velocity: 0.5
  dynamics: 0.5
  binary: 1.0
  action: 2.0
  jumps: 0.5
  l_cancel: 0.3
  hurtbox: 0.3
  ground: 0.3
  last_attack: 0.3

save_dir: checkpoints/e018d-horizon-weighted
