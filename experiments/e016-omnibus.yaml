# E016: Omnibus consolidation — cascade + true SS + 7.7K data
# Combines E012 baseline + E014 cascaded heads + E015 true scheduled sampling
# on 4x larger dataset (7.7K FD top-5 games)
# Hypothesis: cascade fixes damage drift, true SS reduces AR drift,
# 4x data resolves E014's overfitting. Best of everything.

data:
  dataset_dir: null
  max_games: null
  stage_filter: 32  # Final Destination
  character_filter: [1, 2, 7, 18, 22]  # Fox, Falcon, Sheik, Marth, Falco

encoding:
  state_age_as_embed: true
  state_age_embed_vocab: 150
  state_age_embed_dim: 8
  press_events: false
  lookahead: 0
  focal_offset: 0
  multi_position: true
  projectiles: false          # encoded data has projectiles=False (138 cols)
  state_flags: true
  hitstun: true
  ctrl_threshold_features: true
  cascaded_heads: true        # E014 — action conditions physics heads
  cascade_embed_dim: 16       # E014

model:
  arch: mamba2
  context_len: 10
  d_model: 384
  d_state: 64
  n_layers: 4
  headdim: 64
  dropout: 0.1
  chunk_size: 10

training:
  lr: 0.0005
  weight_decay: 0.00001
  batch_size: 4096
  num_epochs: 3
  train_split: 0.9
  log_interval: 1000
  scheduled_sampling: 0.3    # E015 — true SS rate
  ss_true: true              # E015 — feeds own predictions back
  ss_anneal_epochs: 2        # E015 — ramp: ep0=0%, ep1=15%, ep2=30%

loss_weights:
  continuous: 1.0
  velocity: 0.5
  dynamics: 0.5
  binary: 1.0
  action: 2.0
  jumps: 0.5
  l_cancel: 0.3
  hurtbox: 0.3
  ground: 0.3
  last_attack: 0.3
  action_change_weight: 5.0

save_dir: checkpoints/e016-omnibus
