# E029a: 7.7K data scaling — validated recipe on 4x more data
# Uses the e028a full-stack recipe (unimix + curriculum) on 7.7K FD top-5
#
# This is the first data scaling test. Tests whether more data breaks
# through the RC 4.798 ceiling and the h20 action_acc 55% ceiling.
#
# H100 recommended: load full 29GB tensors into RAM (no mmap needed),
# faster training (~8-10hr vs ~16-20hr on A100).
#
# Constraint violation instrumentation ships automatically (training/constraints.py).

data:
  dataset_dir: null
  max_games: null
  stage_filter: 32
  character_filter: [1, 2, 7, 18, 22]

encoding:
  state_age_as_embed: true
  state_age_embed_vocab: 150
  state_age_embed_dim: 8
  state_flags: true
  hitstun: true
  ctrl_threshold_features: true
  multi_position: true
  focal_offset: 0
  projectiles: false
  press_events: false
  lookahead: 0

model:
  arch: mamba2
  context_len: 30
  d_model: 768
  d_state: 64
  n_layers: 4
  headdim: 64
  dropout: 0.1
  chunk_size: 15
  unimix_ratio: 0.01

training:
  lr: 0.0005
  weight_decay: 0.00001
  batch_size: 512
  num_epochs: 2
  train_split: 0.9
  log_interval: 500
  warmup_pct: 0.05
  amp: true
  mmap: false          # H100 has 128GB+ RAM — load full tensors, skip mmap

self_forcing:
  enabled: true
  ratio: 4
  unroll_length: 3
  curriculum: [1, 2, 3]

loss_weights:
  continuous: 1.0
  velocity: 0.5
  dynamics: 0.5
  binary: 1.0
  action: 2.0
  jumps: 0.5
  l_cancel: 0.3
  hurtbox: 0.3
  ground: 0.3
  last_attack: 0.3

save_dir: checkpoints/e029a-7k-scaling
