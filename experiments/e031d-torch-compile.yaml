# e031d: torch.compile on top of e031c
#
# Builds on e031c (SF off, bs=2048, GPU-resident). Adds torch.compile() to
# the model construction path. Compiled models reduce Python overhead, fuse
# elementwise ops, and generate optimized CUDA kernels. Expected speedup on
# the forward + backward phases: ~1.2-1.5× for a model of our size.
#
# This is speculative — torch.compile + Mamba2's custom sequential scan
# sometimes doesn't compile cleanly (the scan has data-dependent control
# flow that compile may fall back on). If compile fails or slows things
# down, revert to e031c and move to context_len sweep instead.
#
# Requires trainer.py change: `compile: true` flag that wraps model in
# torch.compile() after the .to(device) call. Not yet implemented — draft
# config is queued so we can run it the moment the compile flag lands.

data:
  dataset_dir: null
  max_games: null
  stage_filter: 32
  character_filter: [1, 2, 7, 18, 22]

encoding:
  state_age_as_embed: true
  state_age_embed_vocab: 150
  state_age_embed_dim: 8
  state_flags: true
  hitstun: true
  ctrl_threshold_features: true
  multi_position: true
  focal_offset: 0
  projectiles: false
  press_events: false
  lookahead: 0

model:
  arch: mamba2
  context_len: 30
  d_model: 768
  d_state: 64
  n_layers: 4
  headdim: 64
  dropout: 0.1
  chunk_size: 15
  unimix_ratio: 0.01

training:
  lr: 0.002
  weight_decay: 0.00001
  batch_size: 2048
  num_epochs: 2
  train_split: 0.9
  log_interval: 500
  warmup_pct: 0.08
  amp: true
  profile: true
  gpu_resident: true
  compile: true            # wrap model in torch.compile() — NEW FLAG

self_forcing:
  enabled: false

loss_weights:
  continuous: 1.0
  velocity: 0.5
  dynamics: 0.5
  binary: 1.0
  action: 2.0
  jumps: 0.5
  l_cancel: 0.3
  hurtbox: 0.3
  ground: 0.3
  last_attack: 0.3

save_dir: checkpoints/e031d-torch-compile
